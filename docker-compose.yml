services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:full
    container_name: llama-server
    ports:
      - "8082:8082"
    volumes:
      - ${MODEL_PATH:-/models/Qwen3.5-9B-Coder-Q4_K_M.gguf}:/models/model.gguf:ro
    environment:
      LLAMA_ARG_MODEL: /models/model.gguf
      LLAMA_ARG_CTX_SIZE: ${CTX_SIZE:-65536}
      LLAMA_ARG_N_GPU_LAYERS: 99
      LLAMA_ARG_N_THREADS: 8
      LLAMA_ARG_PARALLEL: 4
      LLAMA_ARG_BATCH: 2048
      LLAMA_ARG_UBATCH: 512
      LLAMA_ARG_FLASH_ATTN: on
      LLAMA_ARG_CONT_BATCHING: 1
      LLAMA_ARG_METRICS: 1
      LLAMA_ARG_NO_UI: 1
      LLAMA_ARG_REASONING: off
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng-data:/etc/searxng
    restart: unless-stopped

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    environment:
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: ${HONCHO_DB_PASSWORD:-REPLACE_WITH_SECURE_PASSWORD}
      POSTGRES_DB: honcho
    volumes:
      - honcho-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    command: ["redis-server", "--bind", "127.0.0.1"]
    volumes:
      - honcho-redis:/data
    restart: unless-stopped

  honcho:
    image: honcho-repo-api:latest
    container_name: honcho
    network_mode: host
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-REPLACE_WITH_SECURE_PASSWORD}@127.0.0.1:5432/honcho
      REDIS_URL: redis://127.0.0.1:6379/0
      AUTH_USE_AUTH: false
    volumes:
      - honcho-data:/app/data
    restart: unless-stopped

  chrome:
    image: zenika/alpine-chrome:latest
    container_name: browser-chrome
    shm_size: 2g
    ports:
      - "9222:9222"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  searxng-data:
  honcho-postgres:
  honcho-redis:
  honcho-data:
  qdrant-data:
