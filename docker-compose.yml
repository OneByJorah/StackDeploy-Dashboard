services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_NUM_CPU: 4
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_FLASH_ATTENTION: "0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng-data:/etc/searxng
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    environment:
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: ${HONCHO_DB_PASSWORD:-REPLACE_WITH_SECURE_PASSWORD}
      POSTGRES_DB: honcho
    volumes:
      - honcho-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    command: ["redis-server", "--bind", "0.0.0.0"]
    volumes:
      - honcho-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  honcho:
    image: honcho-repo-api:latest
    container_name: honcho
    ports:
      - "8081:8081"
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-REPLACE_WITH_SECURE_PASSWORD}@honcho-db:5432/honcho
      REDIS_URL: redis://honcho-redis:6379/0
      AUTH_USE_AUTH: false
      HONCHO_TOKEN: ${HONCHO_TOKEN:-}
    volumes:
      - honcho-data:/app/data
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    restart: unless-stopped

  chrome:
    image: zenika/alpine-chrome:latest
    container_name: browser-chrome
    shm_size: 2g
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  searxng-data:
  honcho-postgres:
  honcho-redis:
  honcho-data:
  ollama-models:
  qdrant-data:
